<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Sandboxels game</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        .ui { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; background: #151515; width: 100%; justify-content: center; border-bottom: 2px solid #00ff00; }
        button { border: 1px solid #333; background: #222; color: #bbb; padding: 6px 10px; cursor: pointer; font-size: 11px; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #333; color: #fff; }
        button.active { background: #00ff00; color: #000; box-shadow: 0 0 10px #00ff00; }
        canvas { border: 2px solid #333; background: #000; image-rendering: pixelated; margin-top: 10px; cursor: crosshair; }
        .stats { position: fixed; bottom: 15px; left: 15px; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 5px; border-left: 5px solid #00ff00; font-family: monospace; font-size: 12px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="ui" id="toolbar">
        </div>

    <canvas id="c"></canvas>

    <div class="stats">
        AINE: <span id="m-ui">-</span><br>
        LÄMPÖ: <span id="t-ui">20</span>°C<br>
        SIVELLIN: <span id="s-ui">1</span> (Paina 1-4)
    </div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const S = 100, P = 6;
    canvas.width = S * P; canvas.height = S * P;

    let grid = Array(S).fill().map(() => Array(S).fill('empty'));
    let temp = Array(S).fill().map(() => Array(S).fill(20));
    let cur = 'sand', mD = false, mx = 0, my = 0, brushR = 1;

    // --- KAIKKI MATERIAALIT JA NIIDEN OMINAISUUDET ---
    const mats = {
        empty: { c: '#000', grav: false },
        sand: { c: '#edc9af', grav: true, melt: 1000, to: 'lava' },
        rock: { c: '#666', grav: false, melt: 1200, to: 'lava' },
        water: { c: '#0066ff', grav: true, liquid: true, boil: 100, bTo: 'steam', freeze: 0, fTo: 'ice' },
        ice: { c: '#aaddff', grav: false, melt: 1, to: 'water' },
        lava: { c: '#ff4500', grav: true, liquid: true, cool: 600, cTo: 'rock' },
        acid: { c: '#a2ff00', grav: true, liquid: true, corrosive: true },
        oil: { c: '#554422', grav: true, liquid: true, burn: 150 },
        gunpowder: { c: '#444', grav: true, burn: 100 },
        plant: { c: '#228b22', grav: false, burn: 180 },
        wood: { c: '#765432', grav: false, burn: 250 },
        alive: { c: '#0f0', grav: false, ai: true },
        nuke: { c: '#ffff00', grav: true, explosive: true },
        fire: { c: '#ff6600', gas: true, life: 20 },
        smoke: { c: '#333', gas: true, life: 60 },
        steam: { c: '#ffffff44', gas: true, life: 100 }
    };

    // Generoidaan napit automaattisesti
    const toolbar = document.getElementById('toolbar');
    Object.keys(mats).forEach(m => {
        if(m === 'empty' || m === 'fire' || m === 'smoke' || m === 'steam') return;
        const btn = document.createElement('button');
        btn.innerText = m.toUpperCase();
        btn.id = 'btn-' + m;
        btn.onclick = () => setM(m);
        toolbar.appendChild(btn);
    });
    // Työkalut
    ['heat', 'cool', 'eraser', 'reset'].forEach(t => {
        const btn = document.createElement('button');
        btn.innerText = t.toUpperCase();
        btn.style.background = t === 'reset' ? '#500' : '#333';
        btn.onclick = () => {
            if(t === 'reset') resetGrid();
            else setM(t === 'eraser' ? 'empty' : t);
        };
        toolbar.appendChild(btn);
    });

    function setM(m) { 
        cur = m; 
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m)?.classList.add('active');
    }

    function resetGrid() { grid = grid.map(r => r.fill('empty')); temp = temp.map(r => r.fill(20)); }

    // Hiiri ja Sivellin
    canvas.onmousedown = () => mD = true;
    window.onmouseup = () => mD = false;
    window.onmousemove = (e) => {
        const r = canvas.getBoundingClientRect();
        mx = Math.floor((e.clientX - r.left) / P);
        my = Math.floor((e.clientY - r.top) / P);
        if(mD && mx>=0 && mx<S && my>=0 && my<S) {
            let b = brushR - 1;
            for(let i=-b; i<=b; i++) for(let j=-b; j<=b; j++) {
                let nx=mx+i, ny=my+j;
                if(nx>=0 && nx<S && ny>=0 && ny<S) {
                    if(cur === 'heat') temp[nx][ny] += 400;
                    else if(cur === 'cool') temp[nx][ny] -= 400;
                    else if(cur === 'empty' || grid[nx][ny] === 'empty') {
                        grid[nx][ny] = cur;
                        if(cur === 'lava') temp[nx][ny] = 1200;
                    }
                }
            }
        }
    };

    window.addEventListener('keydown', (e) => {
        if(e.key >= '1' && e.key <= '4') brushR = parseInt(e.key);
        document.getElementById('s-ui').innerText = brushR;
    });

    function update() {
        let next = grid.map(r => [...r]);
        let nextTemp = temp.map(r => [...r]);

        for(let y=S-1; y>=0; y--) {
            for(let x=0; x<S; x++) {
                let m = grid[x][y];
                if(m === 'empty') continue;
                let info = mats[m];
                let t = temp[x][y];

                // --- LÄMPÖTILA JA OLOMUODOT ---
                if(info.melt && t > info.melt) next[x][y] = info.to;
                if(info.boil && t > info.boil) next[x][y] = info.bTo;
                if(info.freeze && t < info.freeze) next[x][y] = info.fTo;
                if(info.cool && t < info.cool) next[x][y] = info.cTo;
                if(info.burn && t > info.burn) { next[x][y] = 'fire'; nextTemp[x][y] += 150; }

                // --- LÄMMÖNJOHTAVUUS ---
                if(x < S-1) nextTemp[x+1][y] += (t - temp[x+1][y]) * 0.1;
                if(y < S-1) nextTemp[x][y+1] += (t - temp[x][y+1]) * 0.1;

                // --- GRAVITAATIO (Hiekka & Nesteet) ---
                if(info.grav) {
                    if(y < S-1) {
                        let below = grid[x][y+1];
                        if(below === 'empty') {
                            next[x][y] = 'empty'; next[x][y+1] = m;
                        } else {
                            // Viistosti putoaminen (keko)
                            let d = Math.random() > 0.5 ? 1 : -1;
                            if(x+d>=0 && x+d<S && grid[x+d][y+1] === 'empty') {
                                next[x][y] = 'empty'; next[x+d][y+1] = m;
                            } 
                            // VAIN NESTEET: Sivulle liikkuminen (tasaantuminen)
                            else if(info.liquid && x+d>=0 && x+d<S && grid[x+d][y] === 'empty') {
                                next[x][y] = 'empty'; next[x+d][y] = m;
                            }
                        }
                    }
                }

                // --- KAASUT ---
                if(info.gas) {
                    if(y > 0) {
                        let dx = Math.floor(Math.random()*3)-1;
                        if(x+dx>=0 && x+dx<S && grid[x+dx][y-1] === 'empty') {
                            next[x][y] = 'empty'; next[x+dx][y-1] = m;
                        }
                    }
                    if(Math.random() > 0.97) next[x][y] = 'empty';
                }

                // --- ERITYISREAKTIOT ---
                // Happo syövyttää
                if(m === 'acid' && y < S-1 && grid[x][y+1] !== 'empty' && grid[x][y+1] !== 'acid') {
                    if(Math.random() > 0.9) { next[x][y+1] = 'empty'; next[x][y] = 'smoke'; }
                }
                // Vesi kasvattaa kasveja
                if(m === 'water' && Math.random() > 0.99) {
                    let dx = Math.floor(Math.random()*3)-1;
                    let dy = Math.floor(Math.random()*3)-1;
                    if(x+dx>=0 && x+dx<S && y+dy>=0 && y+dy<S && grid[x+dx][y+dy] === 'plant') {
                        next[x][y] = 'plant';
                    }
                }
                // Alive Pixel AI
                if(info.ai && Math.random() > 0.8) {
                    let dx = Math.floor(Math.random()*3)-1;
                    let dy = Math.floor(Math.random()*3)-1;
                    if(x+dx>=0 && x+dx<S && y+dy>=0 && y+dy<S && grid[x+dx][y+dy] === 'empty') {
                        next[x][y] = 'empty'; next[x+dx][y+dy] = 'alive';
                    }
                }
                // NUKE RÄJÄHDYS
                if(info.explosive && t > 200) {
                    for(let i=-30; i<=30; i++) for(let j=-30; j<=30; j++) {
                        let nx=x+i, ny=y+j;
                        if(nx>=0 && nx<S && ny>=0 && ny<S && Math.sqrt(i*i+j*j)<25) {
                            next[nx][ny] = Math.random() > 0.3 ? 'fire' : 'smoke';
                            nextTemp[nx][ny] = 3000;
                        }
                    }
                }
            }
        }
        grid = next;
        temp = nextTemp;
        // Jäähtyminen
        for(let i=0; i<S; i++) for(let j=0; j<S; j++) {
            if(temp[i][j] > 20) temp[i][j] -= 0.5;
            if(temp[i][j] < 20) temp[i][j] += 0.5;
        }
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
        for(let x=0; x<S; x++) for(let y=0; y<S; y++) {
            if(grid[x][y] !== 'empty') {
                ctx.fillStyle = mats[grid[x][y]].c;
                ctx.fillRect(x*P, y*P, P, P);
            }
        }
        if(mx>=0 && mx<S && my>=0 && my<S) {
            document.getElementById('m-ui').innerText = grid[mx][my].toUpperCase();
            document.getElementById('t-ui').innerText = Math.floor(temp[mx][my]);
        }
        update();
        requestAnimationFrame(draw);
    }

    setM('sand');
    draw();
</script>
</body>
</html>
